<!DOCTYPE html>
<html>
<head>
  <title>Write Your Future Message</title>
  <meta charset="UTF-8">
</head>
<body>
  <h1>Write a Future Message</h1>

  <form action="success.html">
    <label>Your email:</label><br>
    <input type="email" required><br><br>

    <label>Your message to your future self:</label><br>
    <textarea required></textarea><br><br>

    <label>Delivery date:</label><br>
    <input type="date" required><br><br>

    <button type="submit">Send to the Future</button>
  </form>
</body>
</html>
