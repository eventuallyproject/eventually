<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Send a Message</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

  <form id="message-form">
    <label>Your email</label>
    <input id="email" type="email" required>

    <label>Your message</label>
    <textarea id="message" required></textarea>

    <label>Upload a file (image or video)</label>
    <input id="file" type="file" accept="image/*,video/*" multiple>

    <label>Delivery date</label>
    <input id="deliveryDate" type="date" required>

    <button type="submit">Send</button>
  </form>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    const firebaseConfig = {
  apiKey: "AIzaSyD-JZPYvS-WxJUgqQ48COJJ8PbgNz2ZrA0",
  authDomain: "eventually-project.firebaseapp.com",
  projectId: "eventually-project",
  storageBucket: "eventually-project.appspot.com",
  messagingSenderId: "785146559839",
  appId: "1:785146559839:web:9ad8bd3a578db81e9f4aea"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const form = document.getElementById("message-form");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const message = document.getElementById("message").value;
      const date = document.getElementById("deliveryDate").value;

      const fileInput = document.getElementById("file");
      let fileURLs = [];

      if (fileInput.files.length > 0) {
        const storage = getStorage();

        for (const file of fileInput.files) {
          const storageRef = ref(storage, "uploads/" + file.name);
          await uploadBytes(storageRef, file);
          const url = await getDownloadURL(storageRef);
          fileURLs.push(url);
        }
      }

      await addDoc(collection(db, "messages"), {
        email: email,
        message: message,
        deliveryDate: date,
        fileURLs: fileURLs,
        createdAt: new Date()
      });

      window.location.href = "success.html";
    });
  </script>

</body>
</html>
